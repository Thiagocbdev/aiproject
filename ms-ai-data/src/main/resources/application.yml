server:
  port: 8082

spring:
  application:
    name: ms-ai-data
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
      chat:
        enabled: false
    vectorstore:
      redis:
        uri: ${REDIS_URI:redis://localhost:6379}
        index: hotel-knowledge
        prefix: "hotel:doc:"
        initialize-schema: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_data}
    username: ${DB_USER:hotel}
    password: ${DB_PASS:hotel}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

rag:
  chunk-size: 512
  chunk-overlap: 50
  similarity-threshold: 0.70
  re-index-on-startup: true
