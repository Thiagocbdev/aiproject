server:
  port: 8080

spring:
  application:
    name: ms-hotel-concierge-ai
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:sk-ant-placeholder}
      chat:
        options:
          model: claude-sonnet-4-6
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      chat:
        options:
          model: gpt-4o-mini
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: llama3.2

  threads:
    virtual:
      enabled: true

concierge:
  hotel-info-url: ${HOTEL_INFO_URL:http://localhost:8081}
  ai-data-url: ${AI_DATA_URL:http://localhost:8082}
  temperature:
    booking: 0.15
    faq: 0.35
    recommendation: 0.80

management:
  endpoints:
    web:
      exposure:
        include: health,info
