server:
  port: 8080

spring:
  application:
    name: ms-hotel-concierge-ai
  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY:missing}
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: openai/gpt-oss-120b:free
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: llama3.2

  threads:
    virtual:
      enabled: true

concierge:
  hotel-info-url: ${HOTEL_INFO_URL:http://localhost:8081}
  ai-data-url: ${AI_DATA_URL:http://localhost:8082}
  openrouter:
    model-primary: openai/gpt-oss-120b:free
    model-secondary: openai/gpt-oss-120b:free
  temperature:
    booking: 0.15
    faq: 0.35
    recommendation: 0.80

management:
  endpoints:
    web:
      exposure:
        include: health,info
