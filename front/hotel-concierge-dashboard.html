<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Concierge AI — Agentic Demo</title>
<style>
  :root{
    --bg:#0c0d0f;
    --panel:#16181c;
    --panel-2:#1e2126;
    --border:#2a2d33;
    --text:#e8e8ea;
    --text-secondary:#9a9da3;
    --text-muted:#5f636b;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --teal:#3ecf9a; --teal-dim:#1a3b30;
    --coral:#e0785a; --coral-dim:#3b2620;
    --purple:#9b8cf0; --purple-dim:#2a2540;
    --amber:#e0b354;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--sans); padding:2rem;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:1.25rem; gap:12px; flex-wrap:wrap;
  }
  .topbar h1{ font-size:16px; font-weight:600; margin:0; display:flex; align-items:center; gap:8px;}
  .topbar h1 .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);}
  .topbar-right{ display:flex; align-items:center; gap:12px; }
  .topbar .status{font-size:12px; color:var(--text-secondary); display:flex; align-items:center; gap:6px;}
  .analytics-link{ font-size:12px; color:var(--text-muted); text-decoration:none; }
  .analytics-link:hover{ color:var(--text-secondary); }

  .ctx-toggle{
    background:transparent; border:1px solid var(--border); border-radius:6px;
    color:var(--text-secondary); padding:5px 14px; font-size:12px; cursor:pointer;
    font-family:var(--sans); transition: all .15s;
  }
  .ctx-toggle.active{
    background:var(--teal-dim); border-color:var(--teal); color:var(--teal);
  }

  .provider-selector{ display:flex; gap:8px; margin-bottom:8px; align-items:center; }
  .provider-selector .ps-label{ font-size:11px; color:var(--text-muted); margin-right:4px; }
  .ps-btn{
    background:transparent; border:1px solid var(--border); border-radius:6px;
    color:var(--text-secondary); padding:4px 12px; font-size:12px; cursor:pointer;
    font-family:var(--sans); transition: all .15s; user-select:none;
  }
  .ps-btn[data-provider="anthropic"].active{ background:#1a3b30; border-color:#3ecf9a; color:#3ecf9a; }
  .ps-btn[data-provider="openai"].active{    background:#3b2e10; border-color:#e0b354; color:#e0b354; }
  .ps-btn[data-provider="ollama"].active{    background:#2a2540; border-color:#9b8cf0; color:#9b8cf0; }
  .ps-btn:hover:not(.active){ border-color:#3a3f47; color:var(--text); }

  .askbar{ display:flex; gap:8px; margin-bottom:1.5rem; }
  .askbar input{
    flex:1; background:var(--panel); border:1px solid var(--border); border-radius:8px;
    color:var(--text); padding:10px 14px; font-size:14px; font-family:var(--sans);
  }
  .askbar input:focus{ outline:none; border-color:#3a3f47; }
  .askbar button{
    background:var(--text); color:#0c0d0f; border:none; border-radius:8px;
    padding:0 20px; font-size:14px; font-weight:600; cursor:pointer;
  }
  .askbar button:disabled{ opacity:0.4; cursor:default; }

  .grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; }
  @media (max-width: 900px){ .grid{ grid-template-columns:1fr; } }

  .col{
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:14px; display:flex; flex-direction:column; gap:10px; min-height:360px;
  }
  .col-header{ display:flex; align-items:center; justify-content:space-between; }
  .col-header .name{ font-size:13px; font-weight:600; }
  .col-status{ display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-secondary); }
  .col-status .dot{ width:6px; height:6px; border-radius:50%; }
  .dot-online{ background:var(--teal); }
  .dot-offline{ background:var(--text-muted); }
  .dot-error{ background:var(--coral); }
  .dot-streaming{ background:var(--teal); animation:pulse 1s ease-in-out infinite; }

  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* col metrics row: two lines */
  .col-metrics{
    display:flex; flex-direction:column; gap:2px;
    font-size:11px; font-family:var(--mono); color:var(--text-muted);
  }
  .col-metrics-last{ display:flex; justify-content:space-between; }
  .col-metrics-session{ color:var(--text-muted); font-size:10px; }
  .col-metrics-session span{ color:var(--purple); }

  .badges{ display:flex; flex-wrap:wrap; gap:6px; min-height:22px; }
  .badge{
    font-size:11px; padding:3px 8px; border-radius:6px; display:flex; align-items:center; gap:4px;
    background:var(--panel-2); color:var(--text-secondary);
  }
  .badge.tool{ color:var(--coral); background:var(--coral-dim); }
  .badge.rag{ color:var(--purple); background:var(--purple-dim); }
  .badge.cache{ color:var(--amber); background:#2e2510; }

  .log{
    background:var(--panel-2); border-radius:8px; padding:8px 10px;
    font-family:var(--mono); font-size:11px; line-height:1.6; color:var(--text-secondary);
    min-height:52px; white-space:pre-wrap;
  }

  .responses{ display:flex; flex-direction:column; gap:2px; flex:1; overflow-y:auto; }
  .bubble{
    background:var(--panel-2); border-radius:8px; padding:8px 10px; font-size:12.5px;
    line-height:1.5; opacity:0; transform:translateY(4px);
    animation:appear .25s ease forwards;
  }
  @keyframes appear{ to{ opacity:1; transform:translateY(0); } }
  .bubble.placeholder{ color:var(--text-muted); font-style:italic; }
  .bubble.error{ color:var(--coral); background:var(--coral-dim); opacity:1; transform:none; }
  .bubble.streaming{ opacity:1; transform:none; animation:none; }

  /* ── MS progress — 3 grupos × 3 barras, nome abaixo ── */
  .ms-progress{ display:flex; gap:7px; align-items:flex-end; }
  .ms-group{ display:flex; flex-direction:column; align-items:center; gap:2px; }
  .ms-bars{ display:flex; flex-direction:column; gap:2px; }
  .ms-bar{
    width:38px; height:5px; border-radius:2px;
    background:var(--panel-2);
    transition:background .2s ease, box-shadow .2s ease;
  }
  .ms-bar.on{
    background:var(--bar-color, #3ecf9a);
    box-shadow:0 0 4px var(--bar-glow, rgba(62,207,154,.4));
  }
  .ms-bar.pulse{ animation:barPulse .65s ease-in-out infinite; }
  .ms-bar.err{
    background:var(--coral) !important;
    box-shadow:0 0 4px rgba(224,120,90,.5) !important;
    animation:none !important;
  }
  .ms-label{
    font-size:8px; font-family:var(--mono); color:var(--text-muted);
    white-space:nowrap;
  }
  @keyframes barPulse{ 0%,100%{opacity:1;} 50%{opacity:.2;} }

  /* T = Thread header */
  .thread-header{
    display:flex; align-items:center; gap:8px;
    margin:16px 0 2px; color:var(--teal);
    font-size:10px; font-family:var(--mono); font-weight:700;
    letter-spacing:0.04em; text-transform:uppercase;
  }
  .thread-header::before,.thread-header::after{
    content:''; flex:1; height:1px; background:var(--teal-dim);
  }
  .thread-header.oneshot{ color:var(--text-muted); }
  .thread-header.oneshot::before,.thread-header.oneshot::after{ background:var(--border); }

  /* M = Message header row */
  .msg-header{
    display:flex; align-items:center; justify-content:space-between;
    margin:8px 0 2px; padding:0 2px;
  }
  .msg-label{
    font-size:10px; font-family:var(--mono); font-weight:700; color:var(--purple);
  }
  .msg-meta{
    font-size:10px; font-family:var(--mono); color:var(--text-muted); transition:color .2s;
  }
  .msg-meta.loaded{ color:var(--amber); }
  .msg-meta.cached{ color:var(--teal); }
  .msg-meta.error-meta{ color:var(--coral); }
</style>
</head>
<body>

  <div class="topbar">
    <h1><span class="dot"></span>Hotel concierge · agentic demo</h1>
    <div class="topbar-right">
      <button id="ctxToggle" class="ctx-toggle">contexto desativado</button>
      <div class="status" id="statusBar">1 provider ativo</div>
      <a class="analytics-link" href="analytics-dashboard.html">analytics →</a>
    </div>
  </div>

  <div class="provider-selector">
    <span class="ps-label">providers:</span>
    <button class="ps-btn active" data-provider="anthropic">Anthropic</button>
    <button class="ps-btn active" data-provider="openai">OpenAI</button>
    <button class="ps-btn active" data-provider="ollama">Ollama</button>
  </div>

  <div class="askbar">
    <input id="askInput" type="text" placeholder="Pergunte algo ao concierge..."
           onkeydown="if(event.key==='Enter')document.getElementById('askBtn').click()">
    <button id="askBtn">Enviar</button>
  </div>

  <div class="grid" id="grid"></div>

<script>
const API = 'http://localhost:8080';

const PROVIDERS = [
  { id: 'anthropic', label: 'Anthropic',      temperature: 0.15, color: '#3ecf9a' },
  { id: 'openai',    label: 'OpenAI',          temperature: 0.35, color: '#e0b354' },
  { id: 'ollama',    label: 'Ollama (local)',  temperature: 0.80, color: '#9b8cf0' },
];
const PROVIDER_COLOR = Object.fromEntries(PROVIDERS.map(p => [p.id, p.color]));

// ── Provider selector ─────────────────────────────────────────────────────────
function getActiveProviders() {
  return PROVIDERS.filter(p => {
    const btn = document.querySelector(`.ps-btn[data-provider="${p.id}"]`);
    return btn && btn.classList.contains('active');
  });
}

function updateStatusBar() {
  const active = getActiveProviders();
  const label  = active.length === 1 ? 'provider ativo' : 'providers ativos';
  document.getElementById('statusBar').textContent = `${active.length} ${label}`;
}

document.querySelectorAll('.ps-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    updateStatusBar();
  });
});

const sessionId = crypto.randomUUID();
let useContext  = false;

// Thread / Message counters
let threadNumber = 0;
let msgNumber    = 0;
let threadOpen   = false;

// Per-provider element references (reset each turn)
const currentMsgMetaEl    = {};  // { id -> <span> } — header de métricas do M atual
const currentThreadHdrEl  = {};  // { id -> <div>  } — header do T atual (texto atualizado com totais)

// Aggregated token counters
const threadTotals  = {};  // { id -> { in, out } } — totais da thread atual
const sessionTotals = {};  // { id -> { in, out } } — totais de toda a sessão

// Per-turn tracking
const turnStartTime  = {};  // { id -> Date.now() }
const pendingMetrics = {};  // { id -> { tokensIn, tokensOut, cacheHit, durationMs } }

// Initialise accumulators
PROVIDERS.forEach(p => {
  threadTotals[p.id]  = { in: 0, out: 0 };
  sessionTotals[p.id] = { in: 0, out: 0 };
});

const grid = document.getElementById('grid');

// ── Context toggle ──────────────────────────────────────────────────────────
document.getElementById('ctxToggle').addEventListener('click', () => {
  useContext = !useContext;
  const btn = document.getElementById('ctxToggle');
  btn.textContent = useContext ? 'contexto ativado' : 'contexto desativado';
  btn.classList.toggle('active', useContext);
  if (!useContext) threadOpen = false;
});

// ── Column scaffold ─────────────────────────────────────────────────────────
function renderColumn(p) {
  const div = document.createElement('div');
  div.className = 'col';
  div.id = 'col-' + p.id;
  div.innerHTML = `
    <div class="col-header">
      <span class="name">${p.label}</span>
      <span class="col-status" id="status-${p.id}">
        <span class="dot dot-offline"></span>aguardando
      </span>
    </div>
    <div class="col-metrics">
      <div style="margin-bottom:5px;">
        <div class="ms-progress" id="ms-prog-${p.id}">
          <div class="ms-group" data-ms="concierge">
            <div class="ms-bars">
              <div class="ms-bar" data-step="1"></div>
              <div class="ms-bar" data-step="2"></div>
              <div class="ms-bar" data-step="3"></div>
            </div>
            <div class="ms-label">concierge</div>
          </div>
          <div class="ms-group" data-ms="ai-data">
            <div class="ms-bars">
              <div class="ms-bar" data-step="1"></div>
              <div class="ms-bar" data-step="2"></div>
              <div class="ms-bar" data-step="3"></div>
            </div>
            <div class="ms-label">ai-data</div>
          </div>
          <div class="ms-group" data-ms="hotel-info">
            <div class="ms-bars">
              <div class="ms-bar" data-step="1"></div>
              <div class="ms-bar" data-step="2"></div>
              <div class="ms-bar" data-step="3"></div>
            </div>
            <div class="ms-label">hotel-info</div>
          </div>
        </div>
      </div>
      <div class="col-metrics-last">
        <span id="tok-${p.id}">— / —</span>
        <span>temp ${p.temperature}</span>
      </div>
      <div class="col-metrics-session" id="sess-${p.id}">sessão <span>↑0 ↓0</span></div>
    </div>
    <div class="badges" id="badges-${p.id}"></div>
    <div class="log" id="log-${p.id}"></div>
    <div class="responses" id="resp-${p.id}">
      <div class="bubble placeholder">aguardando envio…</div>
    </div>
  `;
  grid.appendChild(div);
}
PROVIDERS.forEach(renderColumn);

// ── MS Progress — 3 MSes × 3 estados ────────────────────────────────────────
// Cada MS tem 3 barras: 1=recebeu, 2=processando, 3=respondeu
// ms keys: 'concierge', 'ai-data', 'hotel-info'

const MS_KEYS = ['concierge', 'ai-data', 'hotel-info'];
const msStep = {}; // { providerId: { ms: 0..3 | -1 } }
PROVIDERS.forEach(p => {
  msStep[p.id] = { concierge: 0, 'ai-data': 0, 'hotel-info': 0 };
});

function _msGroup(id, ms) {
  const prog = document.getElementById('ms-prog-' + id);
  return prog ? prog.querySelector(`[data-ms="${ms}"]`) : null;
}

function _msBar(id, ms, step) {
  const g = _msGroup(id, ms);
  return g ? g.querySelector(`.ms-bar[data-step="${step}"]`) : null;
}

function _applyMsColors(id) {
  const color = PROVIDER_COLOR[id] || '#3ecf9a';
  const glow  = color + '66';
  const prog = document.getElementById('ms-prog-' + id);
  if (!prog) return;
  prog.querySelectorAll('.ms-bar').forEach(b => {
    b.style.setProperty('--bar-color', color);
    b.style.setProperty('--bar-glow', glow);
  });
}

function resetMsProgress(id) {
  msStep[id] = { concierge: 0, 'ai-data': 0, 'hotel-info': 0 };
  MS_KEYS.forEach(ms => {
    for (let s = 1; s <= 3; s++) {
      const b = _msBar(id, ms, s);
      if (b) b.className = 'ms-bar';
    }
  });
  _applyMsColors(id);
}

// Set which step an MS has reached (1=recebeu, 2=processando, 3=respondeu)
// Bars 1..step light up; bar at step 2 pulses; step 3 = all solid
function setMsStep(id, ms, step) {
  if (!msStep[id]) return;
  if (msStep[id][ms] === -1) return; // frozen on error
  msStep[id][ms] = step;
  for (let s = 1; s <= 3; s++) {
    const b = _msBar(id, ms, s);
    if (!b) continue;
    b.classList.remove('on', 'pulse', 'err');
    if (s <= step) {
      b.classList.add('on');
      if (s === 2 && step === 2) b.classList.add('pulse');
    }
  }
}

function setMsError(id, ms) {
  if (!msStep[id]) return;
  const prev = msStep[id][ms];
  msStep[id][ms] = -1;
  for (let s = 1; s <= 3; s++) {
    const b = _msBar(id, ms, s);
    if (!b) continue;
    b.classList.remove('on', 'pulse');
    if (s <= Math.max(prev, 1)) b.classList.add('err');
  }
}

// Animate an MS through received→processing→done quickly (for atomic events like rag_search)
function animateMsQuick(id, ms, delays = [0, 120, 340]) {
  setTimeout(() => setMsStep(id, ms, 1), delays[0]);
  setTimeout(() => setMsStep(id, ms, 2), delays[1]);
  setTimeout(() => setMsStep(id, ms, 3), delays[2]);
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function setStatus(id, status) {
  const el = document.getElementById('status-' + id);
  if (!el) return;
  const dots   = { online:'dot-online', streaming:'dot-streaming', error:'dot-error', done:'dot-online', aguardando:'dot-offline', conectando:'dot-offline' };
  const labels = { online:'online', streaming:'streaming…', error:'erro', done:'concluído', aguardando:'aguardando', conectando:'conectando…' };
  el.innerHTML = `<span class="dot ${dots[status] || 'dot-offline'}"></span>${labels[status] || status}`;
}

function appendLog(id, line) {
  const log = document.getElementById('log-' + id);
  log.textContent += (log.textContent ? '\n' : '') + line;
}

function addBadge(id, text, cls) {
  const badges = document.getElementById('badges-' + id);
  const s = document.createElement('span');
  s.className = 'badge ' + (cls || '');
  s.textContent = text;
  badges.appendChild(s);
}

function fmtDur(ms) {
  if (ms == null) return '?';
  return ms >= 1000 ? (ms / 1000).toFixed(1) + 's' : ms + 'ms';
}

function threadHdrText(threadNum, isContext, totals) {
  const base = isContext ? `T${threadNum} · contexto` : `T${threadNum}`;
  if (totals.in === 0 && totals.out === 0) return base;
  return `${base} · ↑${totals.in} ↓${totals.out}`;
}

function updateSessionDisplay(id) {
  const el = document.getElementById('sess-' + id);
  if (!el) return;
  const s = sessionTotals[id];
  el.innerHTML = `sessão <span>↑${s.in} ↓${s.out}</span>`;
}

// ── Thread / Message rendering ───────────────────────────────────────────────

function appendThreadHeader(id, threadNum, isContext) {
  const resp = document.getElementById('resp-' + id);
  const placeholder = resp.querySelector('.placeholder');
  if (placeholder) placeholder.remove();

  const div = document.createElement('div');
  div.className = 'thread-header' + (isContext ? '' : ' oneshot');
  div.textContent = threadHdrText(threadNum, isContext, { in: 0, out: 0 });
  resp.appendChild(div);

  currentThreadHdrEl[id] = div;
  // Store context flag and thread num so we can rebuild the label later
  div._threadNum   = threadNum;
  div._isContext   = isContext;

  threadTotals[id] = { in: 0, out: 0 };
}

function appendMsgHeader(id, msgNum) {
  const resp = document.getElementById('resp-' + id);

  const header = document.createElement('div');
  header.className = 'msg-header';

  const label = document.createElement('span');
  label.className = 'msg-label';
  label.textContent = `M${msgNum}`;

  const meta = document.createElement('span');
  meta.className = 'msg-meta';
  meta.textContent = '⏳';

  header.appendChild(label);
  header.appendChild(meta);
  resp.appendChild(header);

  // Store direct reference — no ID needed, avoids duplicate-ID bug
  currentMsgMetaEl[id] = meta;
}

function prepareForTurn(id) {
  document.getElementById('badges-' + id).innerHTML = '';
  document.getElementById('log-' + id).textContent  = '';
  const prev = document.getElementById('stream-' + id);
  if (prev) prev.removeAttribute('id');
  setStatus(id, 'conectando');
  resetMsProgress(id);
  setMsStep(id, 'concierge', 2);  // recebeu + a processar (bar2 pulsing)
  pendingMetrics[id] = null;
}

// ── SSE event handler ────────────────────────────────────────────────────────
function handleEvent(type, data) {
  const id = data.provider;
  if (!id) return;

  switch (type) {
    case 'token': {
      let streamDiv = document.getElementById('stream-' + id);
      if (!streamDiv) {
        const resp = document.getElementById('resp-' + id);
        streamDiv = document.createElement('div');
        streamDiv.className = 'bubble streaming';
        streamDiv.id = 'stream-' + id;
        resp.appendChild(streamDiv);
        setStatus(id, 'streaming');
      }
      streamDiv.textContent += data.chunk;
      break;
    }
    case 'tool_call': {
      setMsStep(id, 'hotel-info', 2);  // recebeu + a processar
      addBadge(id, data.tool, 'tool');
      const argsStr = Object.entries(data.args || {}).map(([k, v]) => `${k}=${JSON.stringify(v)}`).join(', ');
      appendLog(id, `> tool_call: ${data.tool}(${argsStr})`);
      break;
    }
    case 'tool_result': {
      setMsStep(id, 'hotel-info', 3);  // respondeu
      const preview = JSON.stringify(data.result || '').slice(0, 80);
      appendLog(id, `> result: ${preview}${preview.length >= 80 ? '…' : ''}`);
      break;
    }
    case 'rag_search': {
      animateMsQuick(id, 'ai-data');
      const n = data.chunksFound || 0;
      if (n > 0) addBadge(id, `rag ×${n}`, 'rag');
      appendLog(id, `> rag_search → ${n} chunks`);
      break;
    }
    case 'cache_hit': {
      animateMsQuick(id, 'ai-data', [0, 80, 200]);
      addBadge(id, 'cache hit', 'cache');
      appendLog(id, '> cache hit — resposta sem chamar LLM');
      break;
    }
    case 'metrics': {
      pendingMetrics[id] = {
        tokensIn:   data.tokensIn   ?? 0,
        tokensOut:  data.tokensOut  ?? 0,
        cacheHit:   data.cacheHit   ?? false,
        durationMs: data.durationMs ?? null,
      };
      // Update the "last message" line in the column header (quick preview)
      const tok = document.getElementById('tok-' + id);
      if (tok) {
        const cached = data.cacheHit ? ' ⚡' : '';
        tok.textContent = `↑${data.tokensIn ?? 0} ↓${data.tokensOut ?? 0}${cached}`;
      }
      break;
    }
    case 'done': {
      setMsStep(id, 'concierge', 3);   // respondeu
      if (msStep[id] && msStep[id]['hotel-info'] === 2) setMsStep(id, 'hotel-info', 3);
      setStatus(id, 'done');
      const s = document.getElementById('stream-' + id);
      if (s) { s.removeAttribute('id'); s.className = 'bubble'; }

      const m = pendingMetrics[id] || { tokensIn: 0, tokensOut: 0, cacheHit: false, durationMs: null };
      const elapsedMs = m.durationMs != null
        ? m.durationMs
        : (turnStartTime[id] ? Date.now() - turnStartTime[id] : null);

      // ── Update M header (direct element ref — no duplicate-ID issue) ──
      const metaEl = currentMsgMetaEl[id];
      if (metaEl) {
        const durStr = fmtDur(elapsedMs);
        if (m.cacheHit) {
          metaEl.textContent = `↑${m.tokensIn} ↓${m.tokensOut} ⏱${durStr} ⚡cache`;
          metaEl.className = 'msg-meta cached';
        } else {
          metaEl.textContent = `↑${m.tokensIn} ↓${m.tokensOut} ⏱${durStr}`;
          metaEl.className = 'msg-meta loaded';
        }
      }

      // ── Accumulate into thread & session totals ──
      threadTotals[id].in  += m.tokensIn;
      threadTotals[id].out += m.tokensOut;
      sessionTotals[id].in  += m.tokensIn;
      sessionTotals[id].out += m.tokensOut;

      // ── Update T header with thread aggregate ──
      const hdr = currentThreadHdrEl[id];
      if (hdr) {
        hdr.textContent = threadHdrText(hdr._threadNum, hdr._isContext, threadTotals[id]);
      }

      // ── Update session total row ──
      updateSessionDisplay(id);
      break;
    }
    case 'error': {
      setMsError(id, 'concierge');
      setStatus(id, 'error');
      const s = document.getElementById('stream-' + id);
      if (s) s.remove();

      // Update M header with error indicator
      const metaEl = currentMsgMetaEl[id];
      if (metaEl) {
        const is401 = (data.message || '').includes('401') || (data.message || '').toLowerCase().includes('unauthorized');
        metaEl.textContent = is401 ? '401 · sem key' : '⚠ erro';
        metaEl.className = 'msg-meta error-meta';
      }

      const resp = document.getElementById('resp-' + id);
      const b = document.createElement('div');
      b.className = 'bubble error';
      const is401 = (data.message || '').includes('401') || (data.message || '').toLowerCase().includes('unauthorized');
      b.textContent = is401
        ? '⚠ API key não configurada — adicione a chave no .env e reinicie'
        : '⚠ ' + (data.message || 'Erro na chamada ao provider');
      resp.appendChild(b);
      break;
    }
  }
}

// ── Send ─────────────────────────────────────────────────────────────────────
document.getElementById('askBtn').addEventListener('click', async () => {
  const btn            = document.getElementById('askBtn');
  const message        = document.getElementById('askInput').value.trim();
  const activeProviders = getActiveProviders();
  if (!message || btn.disabled) return;
  if (activeProviders.length === 0) { alert('Seleciona pelo menos um provider.'); return; }

  btn.disabled = true;

  if (!useContext) {
    // One-shot: every send = new independent Thread (T) with a single Message (M1)
    threadNumber++;
    msgNumber  = 1;
    threadOpen = false;
    activeProviders.forEach(p => {
      appendThreadHeader(p.id, threadNumber, false);
      appendMsgHeader(p.id, 1);
      prepareForTurn(p.id);
      turnStartTime[p.id] = Date.now();
    });
  } else {
    if (!threadOpen) {
      // First message with context ON → open a new Thread
      threadNumber++;
      threadOpen = true;
      msgNumber  = 1;
      activeProviders.forEach(p => {
        appendThreadHeader(p.id, threadNumber, true);
        appendMsgHeader(p.id, 1);
        prepareForTurn(p.id);
        turnStartTime[p.id] = Date.now();
      });
    } else {
      // Subsequent message in same Thread → new M only, no new T
      msgNumber++;
      activeProviders.forEach(p => {
        appendMsgHeader(p.id, msgNumber);
        prepareForTurn(p.id);
        turnStartTime[p.id] = Date.now();
      });
    }
  }

  let finished = 0;
  let es = null;

  function onProviderFinished() {
    finished++;
    if (finished >= activeProviders.length) {
      if (es) { es.close(); es = null; }
      btn.disabled = false;
    }
  }

  try {
    const res = await fetch(`${API}/api/v1/concierge/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, providers: activeProviders.map(p => p.id), sessionId, useContext })
    });

    if (!res.ok) {
      activeProviders.forEach(p => handleEvent('error', { provider: p.id, message: `HTTP ${res.status} — backend indisponível` }));
      btn.disabled = false;
      return;
    }

    const { requestId, streamUrl } = await res.json();
    es = new EventSource(`${API}${streamUrl || '/api/v1/concierge/stream/' + requestId}`);

    ['token','tool_call','tool_result','rag_search','cache_hit','metrics','done'].forEach(type => {
      es.addEventListener(type, e => {
        try {
          const data = JSON.parse(e.data);
          handleEvent(type, data);
          if (type === 'done') onProviderFinished();
        } catch (err) { console.warn('SSE parse error', type, err); }
      });
    });

    es.addEventListener('error', e => {
      if (e instanceof MessageEvent) {
        try {
          const data = JSON.parse(e.data);
          handleEvent('error', data);
          onProviderFinished();
        } catch (err) { console.warn('SSE parse error', 'error', err); }
      } else {
        if (es) { es.close(); es = null; }
        btn.disabled = false;
      }
    });

  } catch (err) {
    activeProviders.forEach(p => handleEvent('error', { provider: p.id, message: err.message }));
    btn.disabled = false;
  }
});
</script>
