server:
  port: 8081

spring:
  application:
    name: ms-hotel-info
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hotel_info}
    username: ${DB_USER:hotel}
    password: ${DB_PASS:hotel}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
